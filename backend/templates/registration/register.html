{% extends "base.html" %}
{% block title %}Register — PubMed Radar{% endblock %}
{% block content %}
<h1>Create account</h1>
<form method="post" class="auth-form">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
