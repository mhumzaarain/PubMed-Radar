{% extends "base.html" %}
{% block title %}Log in — PubMed Radar{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post" class="auth-form">
  {% csrf_token %}
  {{ form.as_p }}
  <input type="hidden" name="next" value="{{ next }}">
  <button type="submit">Log in</button>
</form>
<p>No account? <a href="{% url 'register' %}">Register</a></p>
{% endblock %}
