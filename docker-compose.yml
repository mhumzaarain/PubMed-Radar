services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pubmed_radar}
      POSTGRES_USER: ${POSTGRES_USER:-pubmed_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pubmed_radar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pubmed_radar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/workspace/backend
    working_dir: /workspace/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: python manage.py procrastinate worker
    volumes:
      - ./backend:/workspace/backend
    working_dir: /workspace/backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
