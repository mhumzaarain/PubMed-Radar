name: Deploy

on:
  push:
    branches: [main]

# Requires these repository secrets to be configured:
#   DEPLOY_HOST      — SSH host of the deployment server
#   DEPLOY_USER      — SSH user
#   DEPLOY_SSH_KEY   — private SSH key
#   DEPLOY_PATH      — absolute path to the project on the server (e.g. /srv/pubmed-radar)

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: []   # add 'test' from ci.yml once you wire up required status checks

    # Only run when CI passes — remove this condition after wiring up branch protection
    if: ${{ false }}   # placeholder: set to true when ready to deploy

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec -T web python manage.py migrate --no-input
            docker compose exec -T web python manage.py collectstatic --no-input
